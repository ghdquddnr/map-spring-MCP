startCommand:
  type: stdio
  command: "node"
  args: ["dist/index.js"]

configSchema:
  type: object
  properties:
    url:
      type: string
      description: "Active database connection URL (e.g., postgresql://user:pass@host:port/dbname). Used for Online Mode."
    ddlPath:
      type: string
      description: "Absolute or relative path to the directory containing .sql DDL files. Used for Offline DDL Mode."

commandFunction: |
  (config) => {
    const args = ["dist/index.js"];
    if (config.url) {
      args.push("--url", config.url);
    }
    if (config.ddlPath) {
      args.push("--ddl-path", config.ddlPath);
    }
    return {
      command: "node",
      args: args
    };
  }
